name: h1b-sre-browser

services:
  app:
    image: h1b-sre-browser:local
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${SRE_BROWSER_PORT:-8080}:8080"
    restart: unless-stopped
    user: "101:101"
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 16
    mem_limit: 32m
    memswap_limit: 32m
    cpus: 0.10
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "1"
